dataset: [ drive ]
mode: multi
device: 2
dist_sf_l1_gamma: 1.0
multi:
  skip_completed: true
  epochs: 500
  folds: 1

  # Run only the currently missing summary-level combos.
  experiments_only: true
  experiments:
    # DRIVE: plain baseline dist + 8 + gjml_sf_l1 is still missing in summary parity.
    - datasets: [ drive ]
      conn_num: 8
      conn_layout: standard8
      label_mode: dist
      dist_aux_loss: gjml_sf_l1
      conn_fusion: none
